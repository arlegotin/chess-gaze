<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chess Gaze Scene Viewer</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./styles.css">
    <!-- CHESS_GAZE_IMPORT_MAP -->
  </head>
  <body>
    <main class="viewer-shell" aria-label="Chess gaze 3D scene viewer">
      <section class="scene-panel" aria-label="Scene viewport">
        <header class="top-bar">
          <div class="title-block">
            <h1>Scene Viewer</h1>
            <p id="frame-status" data-testid="frame-status" role="status">
              Loading local scene data...
            </p>
          </div>
          <dl class="metrics" aria-label="Scene metrics">
            <div>
              <dt>Frame</dt>
              <dd data-testid="frame-label">0 / 0</dd>
            </div>
            <div>
              <dt>Hits</dt>
              <dd data-testid="hit-count">0</dd>
            </div>
          </dl>
        </header>

        <div class="viewport">
          <canvas data-testid="scene-canvas" aria-label="3D scene canvas"></canvas>
          <p class="fallback-status" role="status" aria-live="polite">
            Waiting for local scene data.
          </p>
        </div>
      </section>

      <aside class="control-panel" aria-label="Playback and scene controls">
        <section class="control-section" aria-label="Frame controls">
          <div class="frame-number-row">
            <label for="frame-slider">Frame</label>
            <input
              id="frame-number"
              data-testid="frame-number"
              type="number"
              min="0"
              max="0"
              value="0"
              step="1"
            >
          </div>
          <input
            id="frame-slider"
            data-testid="frame-slider"
            type="range"
            min="0"
            max="0"
            value="0"
            step="1"
          >
          <div class="button-row" aria-label="Frame stepping">
            <button type="button" data-testid="step-prev" aria-label="Previous frame">
              Prev
            </button>
            <button type="button" data-testid="play-pause" aria-label="Play or pause">
              Play
            </button>
            <button type="button" data-testid="step-next" aria-label="Next frame">
              Next
            </button>
          </div>
        </section>

        <fieldset class="mode-group">
          <legend>Hit Display</legend>
          <label>
            <input
              data-testid="mode-instant"
              type="radio"
              name="hit-mode"
              value="instant"
            >
            Instant
          </label>
          <label>
            <input
              data-testid="mode-accumulated"
              type="radio"
              name="hit-mode"
              value="accumulated"
              checked
            >
            Accumulated
          </label>
        </fieldset>

        <fieldset class="toggle-grid">
          <legend>Scene Layers</legend>
          <label><input data-testid="toggle-head" type="checkbox" checked> Head</label>
          <label><input data-testid="toggle-eyes" type="checkbox" checked> Eyes</label>
          <label><input data-testid="toggle-ray" type="checkbox" checked> UniGaze Ray</label>
          <label><input data-testid="toggle-monitor-plane" type="checkbox" checked> Monitor Plane</label>
          <label><input data-testid="toggle-monitor-rectangle" type="checkbox" checked> Monitor Rectangle</label>
          <label><input data-testid="toggle-extended-plane" type="checkbox" checked> Extended Plane</label>
          <label><input data-testid="toggle-axes" type="checkbox" checked> Axes</label>
          <label><input data-testid="toggle-hit-points" type="checkbox" checked> Hit Points</label>
          <label><input data-testid="toggle-hit-area" type="checkbox" checked> Hit Area</label>
          <div class="hit-area-error-row">
            <label for="hit-area-error-degrees">Angular Error</label>
            <input
              id="hit-area-error-degrees"
              data-testid="hit-area-error-degrees"
              type="range"
              min="0"
              max="12"
              value="8"
              step="0.5"
            >
            <output data-testid="hit-area-error-label" for="hit-area-error-degrees">8 deg</output>
          </div>
          <div class="hit-area-opacity-row">
            <label for="hit-area-opacity">Opacity</label>
            <input
              id="hit-area-opacity"
              data-testid="hit-area-opacity"
              type="range"
              min="0"
              max="1"
              value="0.24"
              step="0.01"
            >
            <output data-testid="hit-area-opacity-label" for="hit-area-opacity">24%</output>
          </div>
        </fieldset>

        <section
          class="status-panel"
          data-testid="status-panel"
          aria-label="Current frame status"
        >
          <h2>Status</h2>
          <dl>
            <div>
              <dt>Frame ID</dt>
              <dd data-testid="frame-identity">-</dd>
            </div>
            <div>
              <dt>Ray</dt>
              <dd data-testid="ray-status">-</dd>
            </div>
            <div>
              <dt>Monitor Hit</dt>
              <dd data-testid="hit-status">-</dd>
            </div>
            <div>
              <dt>Accumulated</dt>
              <dd data-testid="accumulated-status">0</dd>
            </div>
          </dl>
        </section>

        <section class="axis-legend" aria-label="Axes legend">
          <h2>Axes</h2>
          <p><span class="axis-chip axis-x"></span> X streamer right</p>
          <p><span class="axis-chip axis-y"></span> Y scene up</p>
          <p><span class="axis-chip axis-z"></span> Z streamer back</p>
        </section>
      </aside>
    </main>

    <script type="module" src="./scene_viewer.js"></script>
  </body>
</html>
