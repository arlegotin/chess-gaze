<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chess Gaze Scene Viewer</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="viewer-shell" aria-label="Chess gaze 3D scene viewer">
      <section class="scene-panel" aria-label="Scene viewport">
        <header class="top-bar">
          <div>
            <h1>Scene Viewer</h1>
            <p id="frame-status" data-testid="frame-status">Loading scene data...</p>
          </div>
          <div class="metric" aria-label="Valid hit count">
            <span>Hits</span>
            <strong data-testid="hit-count">0</strong>
          </div>
        </header>

        <div class="viewport">
          <canvas data-testid="scene-canvas" aria-label="3D scene canvas"></canvas>
          <p class="fallback-status" role="status" aria-live="polite">
            Waiting for local scene data.
          </p>
        </div>
      </section>

      <aside class="control-panel" aria-label="Playback controls">
        <div class="control-group">
          <label for="frame-slider">Frame</label>
          <input
            id="frame-slider"
            data-testid="frame-slider"
            type="range"
            min="0"
            max="0"
            value="0"
            step="1"
          >
        </div>

        <div class="button-row" aria-label="Frame stepping">
          <button type="button" data-testid="step-prev" aria-label="Previous frame">
            Prev
          </button>
          <button type="button" data-testid="play-pause" aria-label="Play or pause">
            Play
          </button>
          <button type="button" data-testid="step-next" aria-label="Next frame">
            Next
          </button>
        </div>

        <fieldset class="mode-group">
          <legend>Hit display</legend>
          <label>
            <input
              data-testid="mode-instant"
              type="radio"
              name="hit-mode"
              value="instant"
              checked
            >
            Instant
          </label>
          <label>
            <input
              data-testid="mode-accumulated"
              type="radio"
              name="hit-mode"
              value="accumulated"
            >
            Accumulated
          </label>
        </fieldset>
      </aside>
    </main>

    <script type="module" src="./scene_viewer.js"></script>
  </body>
</html>
